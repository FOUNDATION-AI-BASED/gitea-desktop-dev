# Build and release Gitea Desktop when a version tag is pushed
name: Release

on:
  push:
    tags:
      - 'v*'

env:
  NODE_VERSION: 24.11.1

jobs:
  build:
    name: Build ${{ matrix.friendlyName }} ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            arch: x64
            friendlyName: macOS
          - os: macos-14
            arch: arm64
            friendlyName: macOS
          - os: windows-2022
            arch: x64
            friendlyName: Windows
          - os: windows-2022
            arch: arm64
            friendlyName: Windows
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn

      - name: Install dependencies
        run: yarn
        env:
          npm_config_arch: ${{ matrix.arch }}
          TARGET_ARCH: ${{ matrix.arch }}

      - name: Validate macOS version
        if: runner.os == 'macOS'
        run: yarn validate-macos-version

      - name: Build production app
        run: yarn build:prod
        env:
          RELEASE_CHANNEL: production
          NODE_ENV: production
          DESKTOP_OAUTH_CLIENT_ID: ${{ secrets.DESKTOP_OAUTH_CLIENT_ID }}
          DESKTOP_OAUTH_SECRET: ${{ secrets.DESKTOP_OAUTH_SECRET }}
          npm_config_arch: ${{ matrix.arch }}
          TARGET_ARCH: ${{ matrix.arch }}

      - name: Package production app (macOS - unsigned)
        if: runner.os == 'macOS'
        run: yarn package
        env:
          RELEASE_CHANNEL: development
          npm_config_arch: ${{ matrix.arch }}

      - name: Package production app (Windows - unsigned)
        if: runner.os == 'Windows'
        run: yarn package
        env:
          RELEASE_CHANNEL: development
          npm_config_arch: ${{ matrix.arch }}

      - name: Upload macOS artifact
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: |
            dist/Gitea Desktop-${{ matrix.arch }}.zip

      - name: Upload Windows artifacts
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.arch }}
          path: |
            dist/GiteaDesktopSetup-${{ matrix.arch }}.exe
            dist/GiteaDesktopSetup-${{ matrix.arch }}.msi

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          find artifacts -type f -exec cp {} release-assets/ \;
          ls -la release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Gitea Desktop v${{ steps.version.outputs.VERSION }}
          body: |
            ## Gitea Desktop ${{ steps.version.outputs.VERSION }}

            Git client for self-hosted Gitea instances.

            ### Downloads

            - **macOS (Intel)**: `Gitea Desktop-x64.zip`
            - **macOS (Apple Silicon)**: `Gitea Desktop-arm64.zip`
            - **Windows (64-bit)**: `GiteaDesktopSetup-x64.exe` or `.msi`
            - **Windows (ARM64)**: `GiteaDesktopSetup-arm64.exe` or `.msi`
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, '-') }}
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
