# Triage automation (fork): scheduled runs disabled to save Actions minutes.
# Re-enable cron below if you want hourly/daily triage against desktop/shared workflows.
name: Triage Scheduled Tasks
on:
  workflow_dispatch:
  issue_comment:
    types: [created]

jobs:
  no-response:
    if: github.event_name == 'issue_comment'
    uses: desktop/gh-cli-and-desktop-shared-workflows/.github/workflows/triage-no-response-close.yml@main
    permissions:
      issues: write

  pr-requirements:
    if: github.event_name == 'issue_comment'
    uses: desktop/gh-cli-and-desktop-shared-workflows/.github/workflows/triage-pr-requirements.yml@main
    permissions:
      issues: read
      pull-requests: write

  # Stale / pitch-surface jobs previously ran on cron; run manually via workflow_dispatch if needed.
  pitch-surface:
    if: github.event_name == 'workflow_dispatch'
    uses: desktop/gh-cli-and-desktop-shared-workflows/.github/workflows/pitch-surface-top-issues.yml@main
    permissions:
      issues: write
